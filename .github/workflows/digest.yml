name: Daily Digest

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST every day
  workflow_dispatch:         # also allow manual trigger from GitHub UI

jobs:
  build-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit digest JSON back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Build digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/build-digest.js

      - name: Commit digest to repo
        run: |
          git config user.name "Digest Bot"
          git config user.email "bot@digest"
          git add docs/digests/
          git diff --staged --quiet || git commit -m "digest: $(date -u '+%Y-%m-%d')"
          git push
